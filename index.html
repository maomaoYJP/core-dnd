<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>any-drag — core</title>
  </head>
  <style>
    .container {
      width: 600px;
      height: 300px;
      margin: 20px auto;
      overflow: auto;
      padding: 8px;
      border: 1px solid rgb(185, 183, 183);
      border-radius: 6px;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .container.horizontal {
      flex-direction: row;
      width: 800px;
    }

    .container .drag-draggable-wrapper {
      flex-shrink: 0;
    }

    .item1 {
      height: 50px;
      background-color: lightblue;
      border-radius: 6px;
    }
    .item2 {
      height: 100px;
      background-color: lightblue;
      border-radius: 6px;
    }
    .item3 {
      height: 70px;
      background-color: lightblue;
      border-radius: 6px;
    }

    .hitem1 {
      width: 50px;
      background-color: lightblue;
      border-radius: 6px;
    }
    .hitem2 {
      width: 200px;
      background-color: lightblue;
      border-radius: 6px;
    }
    .hitem3 {
      width: 70px;
      background-color: lightblue;
      border-radius: 6px;
    }
  </style>
  <body>
    <div style="display: flex; flex-direction: column; gap: 20px">
      <!-- 同容器排序 -->
      <div id="container" class="container" style="flex-shrink: 0">
        <div class="item1">1</div>
        <div class="item2">2</div>
        <div class="item3">3</div>
        <div class="item3">4</div>
        <div class="item3">5</div>
      </div>

      <!-- 跨容器拖拽 -->
      <div id="container2" class="container" style="flex-shrink: 0">
        <div class="item1">A</div>
        <div class="item2">B</div>
        <div class="item3">C</div>
        <div class="item3">D</div>
        <div class="item3">E</div>
      </div>

      <!-- 横向容器 -->
      <div
        id="hcontainer"
        class="container horizontal"
        style="width: 800px; overflow: auto"
      >
        <div class="hitem1">A</div>
        <div class="hitem2">B</div>
        <div class="hitem3">C</div>
        <div class="hitem3">D</div>
        <div class="hitem3">E</div>
      </div>
    </div>
  </body>
  <script type="module">
    import { DragContainer } from "./index.js";
    import { ghostStylePlugin } from "./plugins/ghostStylePlugin.js";

    // 容器 1：空插件，核心最小模式
    new DragContainer(document.querySelector("#container"), {
      plugins: [ghostStylePlugin()],
      onStart: (e) => console.log("start", e),
      onMove: (e) => {
        // console.log("move", e);
      },
      onEnd: (e) => console.log("end", e),
      onAdd: (e) => console.log("add", e),
      onRemove: (e) => console.log("remove", e),
    });

    // 容器 2
    new DragContainer(document.querySelector("#container2"), {
      plugins: [],
      onStart: (e) => console.log("start", e),
      onEnd: (e) => console.log("end", e),
      onAdd: (e) => console.log("add", e),
      onRemove: (e) => console.log("remove", e),
    });

    // 容器 3：横向
    new DragContainer(document.querySelector("#hcontainer"), {
      axis: "horizontal",
      plugins: [],
      onStart: (e) => console.log("start", e),
      onEnd: (e) => console.log("end", e),
    });
  </script>
</html>
