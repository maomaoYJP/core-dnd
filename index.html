<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>any-drag demos</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --panel-soft: #f1f5f9;
        --text: #172033;
        --muted: #657184;
        --line: #d9e0ea;
        --brand: #2563eb;
        --brand-soft: #e8f0ff;
        --green: #16a34a;
        --yellow: #f59e0b;
        --rose: #e11d48;
        --shadow: 0 14px 40px rgba(22, 32, 51, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      button,
      pre {
        font: inherit;
      }

      .app {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        min-height: 100vh;
      }

      .sidebar {
        position: sticky;
        top: 0;
        height: 100vh;
        padding: 28px 18px;
        border-right: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.84);
        backdrop-filter: blur(16px);
      }

      .brand {
        padding: 0 10px 24px;
        border-bottom: 1px solid var(--line);
      }

      .brand h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      .brand p {
        margin: 10px 0 0;
        color: var(--muted);
        line-height: 1.6;
        font-size: 14px;
      }

      .nav {
        display: grid;
        gap: 8px;
        margin-top: 22px;
      }

      .nav-button {
        width: 100%;
        min-height: 46px;
        display: grid;
        grid-template-columns: 28px minmax(0, 1fr);
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border: 1px solid transparent;
        border-radius: 8px;
        color: var(--muted);
        background: transparent;
        cursor: pointer;
        text-align: left;
      }

      .nav-button:hover {
        color: var(--text);
        background: var(--panel-soft);
      }

      .nav-button.is-active {
        color: var(--brand);
        border-color: #c9dcff;
        background: var(--brand-soft);
      }

      .nav-icon {
        width: 28px;
        height: 28px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        background: #eef2f7;
        color: var(--text);
        font-size: 13px;
        font-weight: 700;
      }

      .nav-button.is-active .nav-icon {
        background: var(--brand);
        color: #ffffff;
      }

      .nav-title {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-weight: 700;
      }

      .main {
        min-width: 0;
        padding: 34px clamp(20px, 4vw, 56px);
      }

      .hero {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 24px;
      }

      .hero h2 {
        margin: 0;
        font-size: clamp(30px, 4vw, 48px);
        line-height: 1.08;
        letter-spacing: 0;
      }

      .hero p {
        max-width: 720px;
        margin: 14px 0 0;
        color: var(--muted);
        line-height: 1.75;
      }

      .reset-button {
        flex: 0 0 auto;
        height: 38px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        background: var(--panel);
        cursor: pointer;
        box-shadow: 0 5px 18px rgba(22, 32, 51, 0.06);
      }

      .reset-button:hover {
        border-color: #b7c5d8;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 24px;
      }

      .tag {
        padding: 6px 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        background: var(--panel);
        font-size: 13px;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
        gap: 20px;
        align-items: start;
      }

      .demo-panel,
      .code-panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .demo-panel {
        min-height: 580px;
        padding: 20px;
      }

      .section-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .section-title h3 {
        margin: 0;
        font-size: 16px;
      }

      .hint {
        color: var(--muted);
        font-size: 13px;
      }

      .stage {
        display: grid;
        gap: 16px;
        min-height: 480px;
        padding: 18px;
        border: 1px dashed #c9d3e2;
        border-radius: 8px;
        background: #fbfcfe;
      }

      .stage.two-columns {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .demo-list {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-height: 320px;
        max-height: 420px;
        padding: 12px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-soft);
      }

      .demo-list.horizontal {
        min-height: 220px;
        max-height: none;
        flex-direction: row;
        align-items: stretch;
        overflow-x: auto;
        overflow-y: hidden;
      }

      .demo-list.tall {
        height: 420px;
      }

      .demo-list-title {
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .demo-column {
        min-width: 0;
      }

      .demo-card {
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 58px;
        padding: 12px 14px;
        border: 1px solid #d5deea;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 8px 18px rgba(22, 32, 51, 0.06);
        user-select: none;
      }

      .demo-card.large {
        min-height: 96px;
      }

      .demo-card.compact {
        min-height: 46px;
      }

      .demo-card.horizontal-item {
        width: 150px;
        min-height: 170px;
        flex: 0 0 auto;
        align-items: flex-start;
      }

      .demo-card.green {
        border-color: #bbf7d0;
        background: #f0fdf4;
      }

      .demo-card.yellow {
        border-color: #fde68a;
        background: #fffbeb;
      }

      .demo-card.rose {
        border-color: #fecdd3;
        background: #fff1f2;
      }

      .card-index {
        width: 28px;
        height: 28px;
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        border-radius: 8px;
        background: #e2e8f0;
        color: #334155;
        font-weight: 800;
      }

      .card-text {
        min-width: 0;
      }

      .card-text strong,
      .card-text span {
        display: block;
      }

      .card-text span {
        margin-top: 3px;
        color: var(--muted);
        font-size: 13px;
      }

      .drag-handle {
        width: 30px;
        height: 30px;
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        color: #475569;
        background: #f8fafc;
        cursor: grab;
      }

      .drag-preview {
        border: 1px dashed var(--brand);
        border-radius: 8px;
        background: rgba(37, 99, 235, 0.1);
      }

      .showcase-ghost {
        position: fixed;
        z-index: 9999;
        pointer-events: none;
        border-radius: 8px;
        box-shadow: 0 18px 42px rgba(22, 32, 51, 0.2);
        opacity: 0.95;
      }

      .code-panel {
        overflow: hidden;
      }

      .code-header {
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        background: #f8fafc;
        font-weight: 800;
      }

      .code {
        min-height: 500px;
        margin: 0;
        padding: 18px;
        overflow: auto;
        color: #dbeafe;
        background: #111827;
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 13px;
        line-height: 1.65;
        white-space: pre;
      }

      @media (max-width: 980px) {
        .app {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: static;
          height: auto;
          padding: 18px;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .nav {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .workspace,
        .stage.two-columns {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        .main {
          padding: 22px 14px;
        }

        .hero {
          display: grid;
        }

        .reset-button {
          width: 100%;
        }

        .nav {
          grid-template-columns: 1fr;
        }

        .demo-panel {
          padding: 14px;
        }

        .stage {
          padding: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <h1>any-drag</h1>
          <p>轻量、可插件化的原生 JavaScript 拖拽排序库。</p>
        </div>
        <nav id="demoNav" class="nav" aria-label="功能列表"></nav>
      </aside>

      <main class="main">
        <header class="hero">
          <div>
            <h2 id="demoTitle"></h2>
            <p id="demoDescription"></p>
          </div>
          <button id="resetDemo" class="reset-button" type="button">
            重置 Demo
          </button>
        </header>

        <div class="tags" aria-label="项目特性">
          <span class="tag">ES Module</span>
          <span class="tag">无框架依赖</span>
          <span class="tag">插件化生命周期</span>
          <span class="tag">纵向 / 横向排序</span>
        </div>

        <section class="workspace">
          <div class="demo-panel">
            <div class="section-title">
              <h3>交互演示</h3>
              <span class="hint">拖动卡片体验当前功能</span>
            </div>
            <div id="demoStage" class="stage"></div>
          </div>

          <aside class="code-panel">
            <div class="code-header">核心配置</div>
            <pre id="demoCode" class="code"></pre>
          </aside>
        </section>
      </main>
    </div>

    <script type="module">
      import { DragManager } from "./index.js";

      const nav = document.querySelector("#demoNav");
      const title = document.querySelector("#demoTitle");
      const description = document.querySelector("#demoDescription");
      const stage = document.querySelector("#demoStage");
      const code = document.querySelector("#demoCode");
      const resetButton = document.querySelector("#resetDemo");

      let activeDemoId = "basic";
      let manager = null;

      const demos = [
        {
          id: "basic",
          icon: "01",
          name: "基础排序",
          description:
            "最小配置即可完成同容器纵向拖拽排序，适合普通列表、任务队列和菜单排序。",
          code: `const manager = new DragManager();

manager.mount(document.querySelector("#basicList"), {
  axis: "vertical",
});`,
          render() {
            stage.className = "stage";
            stage.innerHTML = `
              <div id="basicList" class="demo-list">
                ${card("1", "需求评审", "确定拖拽排序的交互边界")}
                ${card("2", "开发实现", "用 DragManager 挂载容器")}
                ${card("3", "联调验证", "拖动后 DOM 顺序自动更新", "large")}
                ${card("4", "发布文档", "补充使用示例")}
              </div>
            `;

            manager.mount(document.querySelector("#basicList"));
          },
        },
        {
          id: "group",
          icon: "02",
          name: "跨容器拖拽",
          description:
            "给多个容器设置相同 group，即可在列表之间拖入、拖出和重新排序。",
          code: `manager.mount(todoList, {
  group: { name: "tasks", pull: true, put: true },
});

manager.mount(doneList, {
  group: { name: "tasks", pull: true, put: true },
});`,
          render() {
            stage.className = "stage two-columns";
            stage.innerHTML = `
              <div class="demo-column">
                <p class="demo-list-title">待处理</p>
                <div id="todoList" class="demo-list">
                  ${card("A", "整理 API", "补齐 README 中的配置说明")}
                  ${card("B", "写 Demo", "覆盖常用拖拽场景", "large")}
                  ${card("C", "检查样式", "确保移动端可读")}
                </div>
              </div>
              <div class="demo-column">
                <p class="demo-list-title">已完成</p>
                <div id="doneList" class="demo-list">
                  ${card("D", "核心排序", "纵向列表已可交互", "", "green")}
                  ${card("E", "插件注册", "常用插件默认启用", "", "green")}
                </div>
              </div>
            `;

            const group = { name: "tasks", pull: true, put: true };
            manager.mount(document.querySelector("#todoList"), { group });
            manager.mount(document.querySelector("#doneList"), { group });
          },
        },
        {
          id: "handle",
          icon: "03",
          name: "拖拽手柄",
          description:
            "通过 handle 限定触发区域，避免点击输入框、按钮或正文内容时误触拖拽。",
          code: `manager.mount(document.querySelector("#handleList"), {
  handle: ".drag-handle",
});`,
          render() {
            stage.className = "stage";
            stage.innerHTML = `
              <div id="handleList" class="demo-list">
                ${handleCard("1", "拖左侧手柄", "正文区域不会触发拖拽")}
                ${handleCard("2", "适合复杂列表项", "可以放按钮、链接、输入框")}
                ${handleCard("3", "更少误操作", "移动端和桌面端都更稳")}
                ${handleCard("4", "配置简单", "传入 CSS 选择器即可")}
              </div>
            `;

            manager.mount(document.querySelector("#handleList"), {
              handle: ".drag-handle",
            });
          },
        },
        {
          id: "horizontal",
          icon: "04",
          name: "横向排序",
          description:
            "把 axis 设置为 horizontal 后，拖拽命中和插入位置会按横向坐标计算。",
          code: `manager.mount(document.querySelector("#horizontalList"), {
  axis: "horizontal",
});`,
          render() {
            stage.className = "stage";
            stage.innerHTML = `
              <div id="horizontalList" class="demo-list horizontal">
                ${card("A", "看板列", "横向移动", "horizontal-item")}
                ${card("B", "时间线", "按顺序排列", "horizontal-item", "yellow")}
                ${card("C", "图片墙", "调整位置", "horizontal-item", "green")}
                ${card("D", "标签组", "左右拖动", "horizontal-item", "rose")}
                ${card("E", "导航项", "重排菜单", "horizontal-item")}
              </div>
            `;

            manager.mount(document.querySelector("#horizontalList"), {
              axis: "horizontal",
            });
          },
        },
        {
          id: "preview",
          icon: "05",
          name: "Preview 占位",
          description:
            "拖拽过程中显示占位元素，用户可以清楚看到松手后会插入的位置。",
          code: `manager.mount(document.querySelector("#previewList"), {
  preview: {
    className: "drag-preview",
    duration: 200,
    easing: "ease-in-out",
  },
});`,
          render() {
            stage.className = "stage";
            stage.innerHTML = `
              <div id="previewList" class="demo-list">
                ${card("1", "创建 ghost", "跟随鼠标移动")}
                ${card("2", "计算插入点", "生成 preview 占位", "large", "yellow")}
                ${card("3", "让位动画", "周围元素平滑移动")}
                ${card("4", "提交 DOM", "松手后更新位置", "", "green")}
              </div>
            `;

            manager.mount(document.querySelector("#previewList"), {
              preview: {
                className: "drag-preview",
                duration: 200,
                easing: "ease-in-out",
              },
            });
          },
        },
        {
          id: "ghost",
          icon: "06",
          name: "Ghost 跟随",
          description:
            "ghost 插件会克隆拖拽项并跟随指针，也可以通过 renderContent 自定义拖拽影子。",
          code: `manager.mount(document.querySelector("#ghostList"), {
  ghost: {
    className: "showcase-ghost",
    renderContent(ctx) {
      return ctx.draggedItem.element.cloneNode(true);
    },
  },
});`,
          render() {
            stage.className = "stage";
            stage.innerHTML = `
              <div id="ghostList" class="demo-list">
                ${card("1", "默认克隆", "ghost 内容来自被拖拽元素")}
                ${card("2", "自定义外观", "用 className 控制样式", "", "rose")}
                ${card("3", "入场动画", "可覆盖 onEnter")}
                ${card("4", "落位动画", "可覆盖 onDrop", "large")}
              </div>
            `;

            manager.mount(document.querySelector("#ghostList"), {
              ghost: {
                className: "showcase-ghost",
                renderContent(ctx) {
                  const clone = ctx.draggedItem.element.cloneNode(true);
                  clone.style.visibility = "visible";
                  clone.style.width = "100%";
                  clone.style.height = "100%";
                  return clone;
                },
              },
            });
          },
        },
        {
          id: "scroll",
          icon: "07",
          name: "自动滚动",
          description:
            "列表内容超出容器时，拖到边缘会触发自动滚动，长列表也能完成排序。",
          code: `manager.mount(document.querySelector("#scrollList"), {
  preview: { className: "drag-preview" },
  ghost: {},
});`,
          render() {
            stage.className = "stage";
            stage.innerHTML = `
              <div id="scrollList" class="demo-list tall">
                ${Array.from({ length: 14 }, (_, index) =>
                  card(
                    String(index + 1).padStart(2, "0"),
                    `长列表项目 ${index + 1}`,
                    "拖到容器边缘观察自动滚动",
                    index % 3 === 0 ? "large" : "compact",
                    index % 4 === 0 ? "green" : "",
                  ),
                ).join("")}
              </div>
            `;

            manager.mount(document.querySelector("#scrollList"), {
              preview: { className: "drag-preview" },
              ghost: {},
            });
          },
        },
      ];

      function card(index, name, detail, size = "", tone = "") {
        const classes = ["demo-card", size, tone].filter(Boolean).join(" ");
        return `
          <div class="${classes}">
            <span class="card-index">${index}</span>
            <span class="card-text">
              <strong>${name}</strong>
              <span>${detail}</span>
            </span>
          </div>
        `;
      }

      function handleCard(index, name, detail) {
        return `
          <div class="demo-card">
            <span class="drag-handle" aria-label="拖拽手柄">::</span>
            <span class="card-index">${index}</span>
            <span class="card-text">
              <strong>${name}</strong>
              <span>${detail}</span>
            </span>
          </div>
        `;
      }

      function renderNav() {
        nav.innerHTML = demos
          .map(
            (demo) => `
              <button
                class="nav-button"
                type="button"
                data-demo-id="${demo.id}"
                aria-pressed="false"
              >
                <span class="nav-icon">${demo.icon}</span>
                <span class="nav-title">${demo.name}</span>
              </button>
            `,
          )
          .join("");

        nav.addEventListener("click", (event) => {
          const button = event.target.closest("[data-demo-id]");
          if (!button) return;
          renderDemo(button.dataset.demoId);
        });
      }

      function renderDemo(id) {
        const demo = demos.find((item) => item.id === id) || demos[0];
        activeDemoId = demo.id;

        if (manager) {
          manager.destroy();
        }
        manager = new DragManager();

        title.textContent = demo.name;
        description.textContent = demo.description;
        code.textContent = demo.code;

        demo.render();
        updateActiveNav();
      }

      function updateActiveNav() {
        for (const button of nav.querySelectorAll("[data-demo-id]")) {
          const isActive = button.dataset.demoId === activeDemoId;
          button.classList.toggle("is-active", isActive);
          button.setAttribute("aria-pressed", String(isActive));
        }
      }

      resetButton.addEventListener("click", () => renderDemo(activeDemoId));

      renderNav();
      renderDemo(activeDemoId);
    </script>
  </body>
</html>
